services:
  postgres:
    image: postgis/postgis:16-3.4
    container_name: alistra-postgis
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - alistra-postgis-data:/var/lib/postgresql/data
      - ../src/database/migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - alistra-internal

  api:
    build:
      context: ..
      dockerfile: Dockerfile
    container_name: alistra-spatial-api
    restart: unless-stopped
    env_file:
      - path: .env.production
        required: false
    environment:
      NODE_ENV: production
      API_HOST: 0.0.0.0
      API_PORT: 3001
      CORS_ORIGIN: ${CORS_ORIGIN}
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - alistra-internal

  nginx:
    image: nginx:1.27-alpine
    container_name: alistra-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - certbot-www:/var/www/certbot
      - letsencrypt:/etc/letsencrypt
    depends_on:
      - api
    networks:
      - alistra-internal

  certbot:
    image: certbot/certbot:v2.11.0
    container_name: alistra-certbot
    volumes:
      - certbot-www:/var/www/certbot
      - letsencrypt:/etc/letsencrypt
    profiles:
      - certbot

volumes:
  alistra-postgis-data:
  certbot-www:
  letsencrypt:

networks:
  alistra-internal:
    driver: bridge
