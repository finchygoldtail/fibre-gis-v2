<svg xmlns="http://www.w3.org/2000/svg" width="297mm" height="210mm" viewBox="0 0 297 210">
  <defs>
    <linearGradient id="headerGradient" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0" stop-color="#061426"/>
      <stop offset="0.58" stop-color="#08243d"/>
      <stop offset="1" stop-color="#0f4c81"/>
    </linearGradient>
    <linearGradient id="panelGradient" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#f8fafc"/>
      <stop offset="1" stop-color="#eef4f8"/>
    </linearGradient>
    <pattern id="quietGrid" width="12" height="12" patternUnits="userSpaceOnUse">
      <path d="M 12 0 L 0 0 0 12" fill="none" stroke="#dbe5ee" stroke-width="0.18"/>
    </pattern>
    <filter id="softShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="1" stdDeviation="0.8" flood-color="#0f172a" flood-opacity="0.18"/>
    </filter>
  </defs>

  <rect x="0.5" y="0.5" width="296" height="209" fill="#ffffff" stroke="#111827" stroke-width="0.7"/>

  <rect x="5" y="5" width="287" height="17" fill="url(#headerGradient)"/>
  <path d="M218 5 L292 5 L292 22 L238 22 Z" fill="#38bdf8" opacity="0.18"/>
  <text x="10" y="14.2" font-family="Arial, Helvetica, sans-serif" font-size="8.2" font-weight="700" fill="#ffffff">ALISTRA GIS</text>
  <text x="10" y="19.5" font-family="Arial, Helvetica, sans-serif" font-size="2.7" font-weight="700" fill="#7dd3fc">ENGINEERING DELIVERY ROUTE PACK</text>
  <text x="195" y="11.8" font-family="Arial, Helvetica, sans-serif" font-size="3.1" font-weight="700" fill="#dbeafe">PROJECT</text>
  <text x="195" y="18.2" font-family="Arial, Helvetica, sans-serif" font-size="4.3" font-weight="700" fill="#ffffff">BD-BAS-AG1</text>
  <text x="247" y="11.8" font-family="Arial, Helvetica, sans-serif" font-size="3.1" font-weight="700" fill="#dbeafe">SHEET TYPE</text>
  <text x="247" y="18.2" font-family="Arial, Helvetica, sans-serif" font-size="4.3" font-weight="700" fill="#ffffff">96F ROUTE</text>

  <rect x="5" y="25" width="224" height="176" fill="#f8fafc" stroke="#0f172a" stroke-width="0.45"/>
  <rect x="7" y="27" width="220" height="172" fill="url(#quietGrid)" opacity="0.95"/>
  <rect x="12" y="32" width="210" height="162" fill="none" stroke="#94a3b8" stroke-width="0.34" stroke-dasharray="3 2"/>
  <text x="88" y="101" font-family="Arial, Helvetica, sans-serif" font-size="6.4" font-weight="700" fill="#334155">ROUTE SCREENSHOT FRAME</text>
  <text x="65" y="109" font-family="Arial, Helvetica, sans-serif" font-size="3.6" fill="#64748b">Place the QGIS screenshot or map item over this frame.</text>
  <text x="69" y="115" font-family="Arial, Helvetica, sans-serif" font-size="3.6" fill="#64748b">Keep the 96F route visible end-to-end.</text>

  <g filter="url(#softShadow)">
    <rect x="12" y="32" width="12" height="20" fill="#ffffff" stroke="#cbd5e1" stroke-width="0.25"/>
    <path d="M18 36 L14.6 45.5 L21.4 45.5 Z" fill="#0f172a"/>
    <text x="16.4" y="50.4" font-family="Arial, Helvetica, sans-serif" font-size="4.3" font-weight="700" fill="#0f172a">N</text>
  </g>

  <g transform="translate(12 184)">
    <rect x="0" y="0" width="42" height="5" fill="#ffffff" stroke="#0f172a" stroke-width="0.25"/>
    <rect x="0" y="0" width="10.5" height="5" fill="#0f172a"/>
    <rect x="21" y="0" width="10.5" height="5" fill="#0f172a"/>
    <text x="0" y="9" font-family="Arial, Helvetica, sans-serif" font-size="2.7" fill="#334155">Scale: QGIS map item / screenshot source</text>
  </g>

  <rect x="234" y="25" width="58" height="176" fill="url(#panelGradient)" stroke="#0f172a" stroke-width="0.45"/>
  <text x="238" y="33" font-family="Arial, Helvetica, sans-serif" font-size="3.1" font-weight="700" fill="#0284c7">CABLE ROUTE SHEET</text>
  <text x="238" y="40" font-family="Arial, Helvetica, sans-serif" font-size="5.8" font-weight="700" fill="#0f172a">96F ULW01</text>
  <text x="238" y="45.5" font-family="Arial, Helvetica, sans-serif" font-size="2.7" fill="#475569">BD-BAS-AG1-96FULW01</text>

  <line x1="238" y1="51" x2="288" y2="51" stroke="#cbd5e1" stroke-width="0.35"/>
  <g font-family="Arial, Helvetica, sans-serif">
    <text x="238" y="57" font-size="2.7" font-weight="700" fill="#64748b">FROM</text>
    <text x="257" y="57" font-size="3.2" font-weight="700" fill="#0f172a">CMJ / FEED</text>
    <text x="238" y="64" font-size="2.7" font-weight="700" fill="#64748b">TO</text>
    <text x="257" y="64" font-size="3.2" font-weight="700" fill="#0f172a">SB ROUTE</text>
    <text x="238" y="71" font-size="2.7" font-weight="700" fill="#64748b">REV</text>
    <text x="257" y="71" font-size="3.2" font-weight="700" fill="#0f172a">DRAFT 01</text>
    <text x="238" y="78" font-size="2.7" font-weight="700" fill="#64748b">STATUS</text>
    <text x="257" y="78" font-size="3.2" font-weight="700" fill="#0f172a">BP REVIEW</text>
  </g>

  <line x1="238" y1="85" x2="288" y2="85" stroke="#cbd5e1" stroke-width="0.35"/>
  <text x="238" y="92" font-family="Arial, Helvetica, sans-serif" font-size="3.8" font-weight="700" fill="#0f172a">KEY</text>
  <g font-family="Arial, Helvetica, sans-serif" font-size="2.8" fill="#0f172a">
    <line x1="239" y1="100" x2="251" y2="100" stroke="#2563eb" stroke-width="1.8" stroke-dasharray="4 2"/>
    <text x="254" y="101">96F selected route</text>
    <line x1="239" y1="108" x2="251" y2="108" stroke="#06b6d4" stroke-width="1.25" stroke-dasharray="4 2"/>
    <text x="254" y="109">48F / 36F context</text>
    <line x1="239" y1="116" x2="251" y2="116" stroke="#f97316" stroke-width="1.15" stroke-dasharray="4 2"/>
    <text x="254" y="117">12F route / spur</text>
    <line x1="239" y1="124" x2="251" y2="124" stroke="#22c55e" stroke-width="0.8"/>
    <text x="254" y="125">Drop cable</text>
    <circle cx="245" cy="132" r="2.2" fill="#facc15" stroke="#0f172a" stroke-width="0.38"/>
    <text x="254" y="133">DP / SB</text>
    <rect x="242.8" y="139" width="4.4" height="4.4" fill="#fb923c" stroke="#9a3412" stroke-width="0.28"/>
    <text x="254" y="143">Home dot</text>
    <rect x="243" y="149" width="4" height="4" fill="#ec4899" stroke="#0f172a" stroke-width="0.3" transform="rotate(45 245 151)"/>
    <text x="254" y="152">Joint / CMJ</text>
    <line x1="239" y1="160" x2="251" y2="160" stroke="#111827" stroke-width="1.0"/>
    <text x="254" y="161">Boundary / PIA</text>
  </g>

  <line x1="238" y1="167" x2="288" y2="167" stroke="#cbd5e1" stroke-width="0.35"/>
  <text x="238" y="173" font-family="Arial, Helvetica, sans-serif" font-size="3.2" font-weight="700" fill="#0f172a">QA CHECKS</text>
  <g font-family="Arial, Helvetica, sans-serif" font-size="2.8" fill="#334155">
    <text x="238" y="179">□ Route visible end-to-end</text>
    <text x="238" y="185">□ Labels legible</text>
    <text x="238" y="191">□ FAS checked</text>
  </g>

  <text x="8" y="207" font-family="Arial, Helvetica, sans-serif" font-size="2.35" fill="#475569">Homes shown as dots only. No UPRN labels on map sheets. Routes, drops and fibre allocations to be reviewed before issue.</text>
  <text x="250" y="207" font-family="Arial, Helvetica, sans-serif" font-size="2.35" font-weight="700" fill="#0f172a">Drawn:</text>
  <line x1="262" y1="207" x2="288" y2="207" stroke="#0f172a" stroke-width="0.25"/>
</svg>
